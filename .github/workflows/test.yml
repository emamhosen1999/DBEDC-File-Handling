name: Tests

on: [push, pull_request]

jobs:
  phpunit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: pdo_mysql

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: Start MySQL
        run: |
          sudo systemctl start mysql
          mysql -e 'CREATE DATABASE IF NOT EXISTS file_tracker_test;' -uroot -proot

      - name: Setup test database
        run: |
          mysql -uroot -proot file_tracker_test < sql/migration.sql
          mysql -uroot -proot file_tracker_test < tests/fixtures/test-data.sql

      - name: Run PHPUnit
        run: ./vendor/bin/phpunit --configuration phpunit.xml

  playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd tests/playwright && npm install

      - name: Install Playwright browsers
        run: cd tests/playwright && npx playwright install --with-deps

      - name: Start PHP built-in server
        run: php -S localhost:8000 &
        shell: bash

      - name: Wait for server
        run: sleep 5

      - name: Run Playwright tests
        run: cd tests/playwright && npm test

      - name: Upload test report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
